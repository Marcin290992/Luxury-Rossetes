<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="../assets/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css">
  <link rel="stylesheet" href="../dist/effect-expo.min.css">
  <link rel="stylesheet" href="./main.css">
  <title>Expo Slider</title>
</head>
<body>
  <div id="app">
    <!-- demo nav -->
    <div class="demo-nav">
      <div class="demo-nav-segmented">
        <button data-direction="horizontal" class="active">Horizontal</button>
        <button data-direction="vertical">Vertical</button>
      </div>
      <button class="demo-nav-rotate">
        <span>Rotate</span>
      </button>
      <button class="demo-nav-theme">
        <svg xmlns="http://www.w3.org/2000/svg" height="16px" viewBox="0 -960 960 960" width="16px" fill="currentColor">
          <path
            d="M480-280q-83 0-141.5-58.5T280-480q0-83 58.5-141.5T480-680q83 0 141.5 58.5T680-480q0 83-58.5 141.5T480-280ZM200-440H40v-80h160v80Zm720 0H760v-80h160v80ZM440-760v-160h80v160h-80Zm0 720v-160h80v160h-80ZM256-650l-101-97 57-59 96 100-52 56Zm492 496-97-101 53-55 101 97-57 59Zm-98-550 97-101 59 57-100 96-56-52ZM154-212l101-97 55 53-97 101-59-57Z" />
        </svg>
      </button>
      <button class="demo-nav-content">
        <svg xmlns="http://www.w3.org/2000/svg" height="16px" viewBox="0 -960 960 960" width="16px" fill="currentColor">
          <path d="M120-240v-80h480v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z" />
        </svg>
      </button>
    </div>
    <!-- Expo Slider -->
    <div class="swiper">
      <div class="swiper-wrapper">
        <div class="swiper-slide">
          <!-- Expo container -->
          <div class="expo-container">
            <!-- Expo image -->
            <img class="expo-image" src="../assets/images/01.jpg" />
            <!-- Expo content, optional -->
            <div class="expo-content">
              Confidence is the best outfit. Wear it and own it!
            </div>
          </div>
        </div>
        <div class="swiper-slide">
          <div class="expo-container">
            <img class="expo-image" src="../assets/images/02.jpg" />
            <div class="expo-content">
              Glow differently. Shine unapologetically.
            </div>
          </div>
        </div>
        <div class="swiper-slide">
          <div class="expo-container">
            <img class="expo-image" src="../assets/images/03.jpg" />
            <div class="expo-content">
              Elegance is an attitude.
            </div>
          </div>
        </div>
        <div class="swiper-slide">
          <div class="expo-container">
            <img class="expo-image" src="../assets/images/04.jpg" />
            <div class="expo-content">
              Fearless. Limitless. Unstoppable.
            </div>
          </div>
        </div>
        <div class="swiper-slide">
          <div class="expo-container">
            <img class="expo-image" src="../assets/images/05.jpg" />
            <div class="expo-content">
              Your vibe attracts your tribe.
            </div>
          </div>
        </div>
        <div class="swiper-slide">
          <div class="expo-container">
            <img class="expo-image" src="../assets/images/06.jpg" />
            <div class="expo-content">
              Style is a way to say who you are without speaking.
            </div>
          </div>
        </div>
        <div class="swiper-slide">
          <div class="expo-container">
            <img class="expo-image" src="../assets/images/07.jpg" />
            <div class="expo-content">
              Be bold, be brilliant, be you.
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
  <script src="../dist/effect-expo.min.js"></script>
  <script>
    const swiper = new Swiper('.swiper', {
      direction: 'horizontal',
      // pass EffectExpo module to modules
      modules: [EffectExpo],
      // specify "expo" effect
      effect: 'expo',
      // "expo" effect mainly design to work with slidesPerView: 1.5
      slidesPerView: 1.5,
      // "expo" effect parameters
      expoEffect: {
        // image scale multiplier, 1.125 is minimum
        imageScale: 1.125,
        // image offset multiplier, recommended to increase for slidesPerView > 2 for better parallax effect
        imageOffset: 1.25,
        // side slides scale multiplier, 1.25 is the minimum
        scale: 1.25,
        // side slides rotate angle (in degrees)
        rotate: 0,
        // side slides grayscale effect
        grayscale: true,
      },
      grabCursor: true,
      spaceBetween: 16,
      breakpoints: {
        768: {
          spaceBetween: 32,
        },
      },
    });
    // Demo Buttons
    const buttonVertical = document.querySelector('.demo-nav button[data-direction="vertical"]')
    const buttonHorizontal = document.querySelector('.demo-nav button[data-direction="horizontal"]')
    buttonHorizontal.addEventListener('click', () => {
      if (swiper.params.direction === 'horizontal') return;
      buttonVertical.classList.remove('active')
      buttonHorizontal.classList.add('active')
      swiper.changeDirection();
      swiper.originalParams.direction = 'horizontal'
    })
    buttonVertical.addEventListener('click', () => {
      if (swiper.params.direction === 'vertical') return;
      buttonVertical.classList.add('active')
      buttonHorizontal.classList.remove('active')
      swiper.changeDirection();
      swiper.originalParams.direction = 'vertical'
    })
    document.querySelector('.demo-nav-rotate').addEventListener('click', (e) => {
      const buttonEl = e.target.closest('button')
      if (buttonEl.classList.contains('active')) {
        swiper.params.expoEffect.rotate = 0
        swiper.originalParams.expoEffect.rotate = 0
        buttonEl.classList.remove('active')
      } else {
        swiper.params.expoEffect.rotate = 30
        swiper.originalParams.expoEffect.rotate = 30
        buttonEl.classList.add('active')
      }
      swiper.update()
    })
    document.querySelector('.demo-nav-theme').addEventListener('click', (e) => {
      document.body.classList.toggle('light')
      e.target.closest('button').classList.toggle('active')
    })
    document.querySelector('.demo-nav-content').addEventListener('click', (e) => {
      document.body.classList.toggle('content-visible')
      e.target.closest('button').classList.toggle('active')
    })
  </script>
</body>
</html>
